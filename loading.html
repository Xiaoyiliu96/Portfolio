<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Wonderland</title>
    <link rel="shortcut icon" href="images/logo/logo_black.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --text-color: #ffffff;
            --accent-color: #00f0ff; 
            --font-family: 'Inter', sans-serif;
        }

        body, html {
            margin: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text-color);
            font-family: var(--font-family);
            overflow: hidden; 
            overscroll-behavior: none; /* Prevents mobile bounce */
        }

        #loader-container {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #030712;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s ease;
        }

        #canvas-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #tunnel {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            perspective: 1200px; 
            z-index: 2;
            pointer-events: none;
        }

        .word {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 10vw, 5rem); 
            font-weight: 900;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: -2px;
            pointer-events: none;
            opacity: 0;
            will-change: transform, opacity;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0);
            transition: text-shadow 0.3s ease, color 0.3s ease;
        }

        .ui-elements {
            position: fixed;
            bottom: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1001;
        }

        .scroll-hint {
            font-size: 0.7rem;
            letter-spacing: 5px;
            opacity: 0.6;
            text-transform: uppercase;
            color: #00f0ff;
            text-shadow: 0 0 8px #00b4d8;
        }

        .bar-bg {
            width: 120px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        #bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: width 0.2s ease;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loader-container">
        <div id="canvas-container"></div>
        <div id="tunnel"></div>
        <div class="ui-elements">
            <div class="scroll-hint">Scroll to Enter</div>
            <div class="bar-bg"><div id="bar-fill"></div></div>
        </div>
    </div>

    <script>
        const words = ["Hello!", "I'm Xiaoyi", "Welcome to My profile"];
        const tunnelDOM = document.getElementById('tunnel');
        const loader = document.getElementById('loader-container');
        const barFill = document.getElementById('bar-fill');
        
        let scrollZ = 0;
        let isTransitioning = false;
        let touchStartY = 0;
        
        const spacing = 1800; 
        const totalDepth = (words.length - 1) * spacing;
        const wordElements = [];
        let scene, camera, renderer, tunnelMesh, texture, cardsGroup;
        const cardsArray = [];
        let tunnelCurve;

        function initDOMWords() {
            words.forEach((text, i) => {
                const el = document.createElement('div');
                el.className = 'word';
                el.innerText = text;
                tunnelDOM.appendChild(el);
                wordElements.push({ el: el, initialZ: i * -spacing });
            });
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x02050c, 0.015);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            const points = [];
            for (let i = 0; i < 120; i++) {
                points.push(new THREE.Vector3(Math.sin(i * 0.12) * 4.5, Math.cos(i * 0.08) * 3.5, i * 12));
            }
            tunnelCurve = new THREE.CatmullRomCurve3(points);
            const tunnelGeometry = new THREE.TubeGeometry(tunnelCurve, 200, 15, 32, false);

            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 512, 0);
            gradient.addColorStop(0, '#010307'); gradient.addColorStop(0.2, '#051021');
            gradient.addColorStop(0.45, '#00b4d8'); gradient.addColorStop(0.55, '#d946ef');
            gradient.addColorStop(0.8, '#0b1d3a'); gradient.addColorStop(1, '#010307');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 512, 512);

            ctx.fillStyle = '#ffffff';
            for(let i=0; i<40; i++) {
                ctx.globalAlpha = Math.random() * 0.4 + 0.2;
                ctx.beginPath(); ctx.arc(Math.random()*512, Math.random()*512, Math.random()*2+1, 0, Math.PI*2); ctx.fill();
            }
            texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping; texture.repeat.set(6, 1);

            const tunnelMaterial = new THREE.MeshStandardMaterial({ map: texture, side: THREE.BackSide, roughness: 0.5, metalness: 0.1 });
            tunnelMesh = new THREE.Mesh(tunnelGeometry, tunnelMaterial);
            scene.add(tunnelMesh);
            setupPlayingCards();
            setupLights();
        }

        function setupPlayingCards() {
            // ... (SVG logic remains the same)
            const createCardSvg = (suit, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="256" height="364" viewBox="0 0 256 364"><rect width="256" height="364" rx="15" fill="#fcfcfc" stroke="#e0e0e0" stroke-width="2"/><text x="25" y="45" font-family="'Georgia', serif" font-size="32" font-weight="bold" fill="${color}" text-anchor="middle">A</text><text x="25" y="75" font-family="serif" font-size="28" fill="${color}" text-anchor="middle">${suit}</text><g transform="rotate(180 128 182)"><text x="25" y="45" font-family="'Georgia', serif" font-size="32" font-weight="bold" fill="${color}" text-anchor="middle">A</text><text x="25" y="75" font-family="serif" font-size="28" fill="${color}" text-anchor="middle">${suit}</text></g><text x="128" y="215" font-family="serif" font-size="140" fill="${color}" text-anchor="middle" dominant-baseline="middle">${suit}</text></svg>`;
            const createSvgTexture = (svgMarkup) => {
                const img = new Image();
                const blob = new Blob([svgMarkup], {type: 'image/svg+xml'});
                const url = URL.createObjectURL(blob);
                const tex = new THREE.Texture();
                img.onload = () => { tex.image = img; tex.needsUpdate = true; URL.revokeObjectURL(url); };
                img.src = url; return tex;
            };

            const texHeart = createSvgTexture(createCardSvg('♥', '#ff0055'));
            const texSpade = createSvgTexture(createCardSvg('♠', '#111622'));
            const texDiamond = createSvgTexture(createCardSvg('♦', '#ff0055'));
            const texClub = createSvgTexture(createCardSvg('♣', '#111622'));

            cardsGroup = new THREE.Group();
            const cardGeo = new THREE.BoxGeometry(4.2, 6.0, 0.12);
            const cardBaseMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.15, metalness: 0.05, clearcoat: 1.0 });

            const config = [
                { tex: texHeart, offsetPos: new THREE.Vector3(-3.5, 2.0, -3), rotSpeed: { x: 1.2, y: 0.8, z: 0.3 } },
                { tex: texSpade, offsetPos: new THREE.Vector3(3.5, -2.0, 1), rotSpeed: { x: -0.9, y: 1.3, z: -0.4 } },
                { tex: texDiamond, offsetPos: new THREE.Vector3(2.5, 3.0, -5), rotSpeed: { x: 0.7, y: -1.0, z: 0.9 } },
                { tex: texClub, offsetPos: new THREE.Vector3(-2.5, -3.0, -1), rotSpeed: { x: 1.1, y: 0.6, z: -0.7 } }
            ];

            config.forEach(cfg => {
                const materials = [cardBaseMat, cardBaseMat, cardBaseMat, cardBaseMat, new THREE.MeshStandardMaterial({ map: cfg.tex }), new THREE.MeshStandardMaterial({ map: cfg.tex })];
                const mesh = new THREE.Mesh(cardGeo, materials);
                const group = new THREE.Group();
                mesh.position.copy(cfg.offsetPos);
                group.add(mesh);
                cardsGroup.add(group);
                cardsArray.push({ group, speed: cfg.rotSpeed });
            });
            scene.add(cardsGroup);
        }

        function setupLights() {
            scene.add(new THREE.AmbientLight(0x020b18, 1.3));
            const spotLight = (color, pos) => { const s = new THREE.SpotLight(color, 6.0, 40, Math.PI/3, 0.5); s.position.set(...pos); scene.add(s); };
            spotLight(0xffb86c, [8, 8, 15]); spotLight(0x00f0ff, [-8, -8, 15]);
        }

        function render() {
            const progressRatio = Math.min(100, (scrollZ / totalDepth) * 100);
            barFill.style.width = `${progressRatio}%`;

            wordElements.forEach((item) => {
                const z = item.initialZ + scrollZ;
                let opacity = (z > -2500 && z < 600) ? (z < -1000 ? (z + 2500) / 1500 : (z <= 200 ? 1 : 1 - (z - 200) / 400)) : 0;
                item.el.style.transform = `translate(-50%, -50%) translateZ(${z}px) rotateZ(${z * 0.1}deg)`;
                item.el.style.opacity = Math.max(0, opacity);
                item.el.style.filter = `blur(${Math.max(0, Math.abs(z) / 150)}px)`;
                item.el.style.color = (z > -200 && z < 200) ? '#00f0ff' : 'white';
            });

            if (scrollZ > totalDepth + 500 && !isTransitioning) jumpToIndex();
        }

        function handleInput(delta) {
            if (isTransitioning) return;
            scrollZ = Math.max(0, scrollZ + delta);
            requestAnimationFrame(render);
        }

        function jumpToIndex() {
            isTransitioning = true;
            loader.style.transform = "scale(4) translateZ(2000px)";
            loader.style.opacity = "0";
            setTimeout(() => window.location.href = "index.html", 800);
        }

        function animateThree() {
            requestAnimationFrame(animateThree);
            const time = performance.now() * 0.001;
            texture.offset.y = time * 0.16;
            const progress = Math.min(0.92, (scrollZ / (totalDepth + 500)) * 0.92);
            camera.position.copy(tunnelCurve.getPointAt(progress));
            camera.lookAt(tunnelCurve.getPointAt(Math.min(1, progress + 0.01)));
            cardsGroup.position.copy(tunnelCurve.getPointAt(Math.min(1, progress + 0.07)));
            cardsArray.forEach(item => {
                item.group.rotation.set(time * item.speed.x, time * item.speed.y, time * item.speed.z);
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('wheel', (e) => handleInput(e.deltaY * 0.8), { passive: false });
        window.addEventListener('touchstart', (e) => touchStartY = e.touches[0].clientY, { passive: true });
        window.addEventListener('touchmove', (e) => {
            handleInput((touchStartY - e.touches[0].clientY) * 1.5);
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        initDOMWords(); initThree(); render(); animateThree();
    </script>
</body>
</html>
