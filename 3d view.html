<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: sans-serif;
        }

        .container {
            width: 80%;
            height: 80vh;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <model-viewer 
            src="images/blackcat/blackcat.glb" 
            alt="A 3D model of a black cat" 
            ar 
            camera-controls 
            touch-action="pan-y"
            autoplay
            auto-rotate
            interaction-prompt="auto"
            shadow-intensity="1.5"
            shadow-softness="1"
            exposure="1"
            loading="eager">
        </model-viewer>
    </div>

</body>
</html>
